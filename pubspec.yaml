name: permission_plus_linux
description: "Linux implementation of the permission_plus plugin."

version: 1.0.0

homepage: https://github.com/jagadeeshchoudhary/permission_plus_linux
repository: https://github.com/jagadeeshchoudhary/permission_plus_linux/tree/main
issue_tracker: https://github.com/jagadeeshchoudhary/permission_plus_linux/issues

environment:
  sdk: ^3.12.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.18.0
  permission_plus_platform_interface: ^1.0.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  pigeon: ^26.3.4

flutter:
  plugin:
    platforms:
      linux:
        dartPluginClass: PermissionPlusLinux
        pluginClass: PermissionPlusLinuxPlugin

topics:
  - permissions
  - linux
  - plugin
